{% extends 'base.html' %}
{% block title %}Changer mon Mot de Passe — ND's REFRESHMENT{% endblock %}
{% block content %}
<section class="py-5" style="background:var(--nds-off-white);min-height:calc(100vh - 80px)">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-3">
        <div class="profil-sidebar">
          <h6 class="sidebar-titre">Mon Espace</h6>
          <ul class="sidebar-nav">
            <li><a href="{{ url_for('profil.profil') }}" class="sidebar-link">
              <i class="bi bi-person me-2"></i>Mon Profil</a></li>
            <li><a href="{{ url_for('profil.modifier_profil') }}" class="sidebar-link">
              <i class="bi bi-pencil me-2"></i>Modifier mes Infos</a></li>
            <li><a href="{{ url_for('profil.changer_password') }}" class="sidebar-link active">
              <i class="bi bi-lock me-2"></i>Changer mon Mot de passe</a></li>
            <li class="mt-3"><a href="{{ url_for('auth.logout') }}" class="sidebar-link text-danger">
              <i class="bi bi-box-arrow-right me-2"></i>Déconnexion</a></li>
          </ul>
        </div>
      </div>
      <div class="col-lg-9">
        <div class="auth-card">
          <h4 class="mb-4"><i class="bi bi-lock me-2"></i>Changer mon Mot de Passe</h4>
          <form action="{{ url_for('profil.changer_password') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="mb-3">
              <label class="form-label">Mot de passe actuel</label>
              <input type="password" name="old_password"
                     class="form-control auth-input" required/>
            </div>
            <div class="mb-3">
              <label class="form-label">Nouveau mot de passe</label>
              <input type="password" name="new_password"
                     class="form-control auth-input" required/>
            </div>
            <div class="mb-4">
              <label class="form-label">Confirmer le nouveau mot de passe</label>
              <input type="password" name="confirm_password"
                     class="form-control auth-input" required/>
            </div>
            <div class="d-flex gap-3">
              <button type="submit" class="btn-auth">
                <i class="bi bi-check-circle me-2"></i>Modifier
              </button>
              <a href="{{ url_for('profil.profil') }}"
                 class="btn-auth-secondary">Annuler</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
