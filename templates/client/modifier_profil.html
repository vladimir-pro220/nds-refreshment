{% extends 'base.html' %}
{% block title %}Modifier mon Profil — ND's REFRESHMENT{% endblock %}
{% block content %}
<section class="py-5" style="background:var(--nds-off-white);min-height:calc(100vh - 80px)">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-3">
        <div class="profil-sidebar">
          <h6 class="sidebar-titre">Mon Espace</h6>
          <ul class="sidebar-nav">
            <li><a href="{{ url_for('profil.profil') }}" class="sidebar-link">
              <i class="bi bi-person me-2"></i>Mon Profil</a></li>
            <li><a href="{{ url_for('profil.modifier_profil') }}" class="sidebar-link active">
              <i class="bi bi-pencil me-2"></i>Modifier mes Infos</a></li>
            <li><a href="{{ url_for('profil.changer_password') }}" class="sidebar-link">
              <i class="bi bi-lock me-2"></i>Changer mon Mot de passe</a></li>
            <li class="mt-3"><a href="{{ url_for('auth.logout') }}" class="sidebar-link text-danger">
              <i class="bi bi-box-arrow-right me-2"></i>Déconnexion</a></li>
          </ul>
        </div>
      </div>
      <div class="col-lg-9">
        <div class="auth-card">
          <h4 class="mb-4"><i class="bi bi-pencil me-2"></i>Modifier mes Informations</h4>
          <form action="{{ url_for('profil.modifier_profil') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label">Prénom</label>
                <input type="text" name="prenom" class="form-control auth-input"
                       value="{{ user.prenom }}" required/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Nom</label>
                <input type="text" name="nom" class="form-control auth-input"
                       value="{{ user.nom }}" required/>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control auth-input"
                     value="{{ user.email }}" required/>
            </div>
            <div class="d-flex gap-3">
              <button type="submit" class="btn-auth">
                <i class="bi bi-check-circle me-2"></i>Enregistrer
              </button>
              <a href="{{ url_for('profil.profil') }}"
                 class="btn-auth-secondary">Annuler</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
