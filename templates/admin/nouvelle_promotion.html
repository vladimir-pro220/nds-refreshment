<!--
FICHIER : templates/admin/nouvelle_promotion.html
RÔLE    : Formulaire de création d'une nouvelle promotion
APPORT  : Permet à l'admin de créer une promotion avec pourcentage,
          dates de validité et produit concerné.
DÉPENDANCES : admin_base.html, admin.nouvelle_promotion, Promotion, Product
-->
{% extends 'admin/admin_base.html' %}

{% block title %}Nouvelle Promotion — Administration ND's REFRESHMENT{% endblock %}

{% block content %}

<div class="admin-page-header">
  <div>
    <h1 class="admin-page-titre">
      <i class="bi bi-tag-fill me-2"></i>Nouvelle Promotion
    </h1>
  </div>
  <a href="{{ url_for('admin.promotions') }}" class="btn-admin-secondary">
    <i class="bi bi-arrow-left me-2"></i>Retour
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="admin-card">
      <div class="admin-card-body p-4">
        <form action="{{ url_for('admin.nouvelle_promotion') }}"
              method="POST" id="formPromotion">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

          <div class="mb-3">
            <label class="admin-label">
              Titre <span class="text-danger">*</span>
            </label>
            <input type="text" name="titre" class="form-control admin-input"
                   placeholder="Ex: Promo Été — Jus Ananas" required/>
          </div>

          <div class="mb-3">
            <label class="admin-label">Description</label>
            <textarea name="description" class="form-control admin-input"
                      rows="3" placeholder="Description optionnelle...">
            </textarea>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="admin-label">
                Produit concerné <span class="text-danger">*</span>
              </label>
              <select name="product_id" class="form-select admin-input" required>
                <option value="" disabled selected>Choisir un produit...</option>
                {% for product in produits %}
                  <option value="{{ product.id }}">
                    {{ product.nom }} — {{ product.formatted_price() }}
                  </option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="admin-label">
                Pourcentage de réduction (%)
                <span class="text-danger">*</span>
              </label>
              <div class="input-group">
                <input type="number" name="pourcentage"
                       class="form-control admin-input"
                       placeholder="Ex: 20" min="1" max="99"
                       step="1" required/>
                <span class="input-group-text">%</span>
              </div>
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="admin-label">
                Date de début <span class="text-danger">*</span>
              </label>
              <input type="date" name="date_debut"
                     class="form-control admin-input" required/>
            </div>
            <div class="col-md-6">
              <label class="admin-label">
                Date de fin <span class="text-danger">*</span>
              </label>
              <input type="date" name="date_fin"
                     class="form-control admin-input" required/>
            </div>
          </div>

          <div class="mb-4">
            <div class="form-check form-switch">
              <input type="checkbox" name="active" id="active"
                     class="form-check-input" checked/>
              <label for="active" class="form-check-label">
                Promotion active immédiatement
              </label>
            </div>
          </div>

          <div class="d-flex gap-3">
            <button type="submit" class="btn-admin-primary">
              <i class="bi bi-check-circle me-2"></i>
              Créer la Promotion
            </button>
            <a href="{{ url_for('admin.promotions') }}"
               class="btn-admin-secondary">Annuler</a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
