<!--
FICHIER : templates/admin/login.html
RÔLE    : Page de connexion administrateur
APPORT  : Formulaire de connexion admin avec un seul champ mot de passe,
          compatible constructeur et admin normal sans distinction visuelle.
DÉPENDANCES : admin.login, login_admin, security.py
-->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administration — ND's REFRESHMENT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}"/>
</head>
<body class="admin-login-body">

<div class="admin-login-wrapper">
  <div class="admin-login-card">

    <!-- Logo -->
    <div class="admin-login-header text-center mb-4">
      <div class="admin-logo">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h2 class="admin-login-titre mt-3">
        <span class="brand-nd">ND's</span>
        <span class="brand-refresh">REFRESHMENT</span>
      </h2>
      <p class="text-muted">Espace Administration</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show mb-3">
            {{ message }}
            <button type="button" class="btn-close"
                    data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Formulaire -->
    <form action="{{ url_for('admin.login') }}" method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

      <div class="mb-4">
        <label for="password" class="form-label">
          <i class="bi bi-lock me-2"></i>Mot de passe
        </label>
        <div class="input-group">
          <input type="password" name="password" id="password"
                 class="form-control admin-input"
                 placeholder="Entrez votre mot de passe"
                 required autofocus/>
          <button type="button" class="btn btn-toggle-pwd"
                  id="togglePassword">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-admin-login w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>
        Accéder à l'Administration
      </button>

    </form>

    <!-- Retour site -->
    <div class="text-center mt-4">
      <a href="{{ url_for('client.index') }}" class="text-muted small">
        <i class="bi bi-arrow-left me-1"></i>
        Retourner à la boutique
      </a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('togglePassword').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      pwd.type = 'password';
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  });
</script>
</body>
</html>
